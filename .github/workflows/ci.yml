name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install paramiko

      - name: Start SSH test containers
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for SSH servers to be ready
        run: |
          for port in 2221 2222 2223; do
            echo "Waiting for SSH on port $port..."
            for i in $(seq 1 30); do
              ssh-keyscan -p $port localhost > /dev/null 2>&1 && echo "Port $port ready" && break
              sleep 2
            done
          done

      - name: Run tests
        run: python examples/test_docker.py

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.test.yml down
